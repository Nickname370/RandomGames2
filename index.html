<!DOCTYPE html>
<html>
<head>
<title>Pelivalikko</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #222;
  color: white;
}

button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.game {
  background: #333;
  padding: 10px;
  border-radius: 10px;
  width: 150px;
  cursor: pointer;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
  background: #444;
}

.game img {
  width: 100%;
  border-radius: 8px;
}

.game p {
  margin: 10px 0 0;
}
</style>

</head>

<body>

<h1>🎮 Pelivalikko</h1>

<div class="menu">

 <!--  Autokisa  -->
  <div class="game" onclick="location.href='Autokisa.html'">
    <img src="auto.png">
    <p>Autokisa</p>
  </div>

	  <!--  Towerdefence  -->
  <div class="game" onclick="location.href='Towerdefence.html'">
    <img src="tower.png">
    <p>Tornin Puolustus</p>
  </div>

	<!--  TerraMine  -->
  <div class="game" onclick="location.href='Terramine.html'">
    <img src="terra.png">
    <p>Terramine</p>
  </div>

  <!--  Flappy peli -->
  <div class="game" onclick="location.href='flappy.html'">
    <img src="flappy.png">
    <p>Paksu Lintu</p>
  </div>
  
   <!--  Clicker peli -->
  <div class="game" onclick="location.href='clicker.html'">
    <img src="clicker.png">
    <p>Clicker peli</p>
  </div>

  <!--  Hyppelypeli -->
  <div class="game" onclick="location.href='jumper.html'">
    <img src="jumper.png">
    <p>Geometria Neliöt</p>
  </div>

</div>

<button onclick="location.href='info.html'">ℹ️ Tietoa</button>

</body>
</html>
