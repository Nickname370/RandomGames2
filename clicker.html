<!DOCTYPE html>
<html>
<head>
<title>Clicker Peli</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    display: flex;
    justify-content: center;
    align-items: start;
    padding: 20px;
  }

  .game {
    background: #2f2f4f;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }

  .click-btn { background: #4CAF50; }
  .upgrade { background: #3a3a5c; padding: 10px; margin-top: 10px; border-radius: 10px; }
  .upgrade button { background: #2196F3; }

  .leaderboard {
    margin-top: 20px;
    background: #1c1c30;
    padding: 10px;
    border-radius: 10px;
  }

  input {
    width: 90%;
    padding: 5px;
    margin-top: 5px;
  }
  
  let save = loadGame();

  
</style>
</head>

<body>
<a href="index.html"><button>⬅️ Takaisin</button></a>

<div class="game">
  <h1>Clicker Peli</h1>

  <p>Pisteet: <span id="score">0</span></p>
  <p>Per klikkaus: <span id="perClick">1</span></p>
  <p>Auto: <span id="auto">0</span>/s</p>

  <button class="click-btn" onclick="clickPoint()">Klikkaa!</button>

  <h2>Kauppa</h2>

  <div class="upgrade">
    <p>+1 klikkaus</p>
    <p>Hinta: <span id="costClick">10</span></p>
    <button onclick="buyClick()">Osta</button>
  </div>

  <div class="upgrade">
    <p>Auto (+1/s)</p>
    <p>Hinta: <span id="costAuto">50</span></p>
    <button onclick="buyAuto()">Osta</button>
  </div>

  <h2>Leaderboard</h2>

  <input id="name" placeholder="Nimesi">
  <button onclick="saveScore()">Tallenna score</button>

  <div class="leaderboard" id="leaderboard"></div>

</div>

<script>
// TALLENNUS FUNKTIOT
function saveGame(data) {
  localStorage.setItem("myGameSave", JSON.stringify(data));
}

function loadGame() {
  return JSON.parse(localStorage.getItem("myGameSave")) || {};
}

let score = 0;
let perClick = 1;
let auto = 0;

let save = loadGame();

if (save.clicker) {
  score = save.clicker.score || 0;
  perClick = save.clicker.perClick || 1;
  auto = save.clicker.auto || 0;
}

let costClick = 10;
let costAuto = 50;

function clickPoint() {
  score += perClick;
  updateUI();
}

function buyClick() {
  if (score >= costClick) {
    score -= costClick;
    perClick++;
    costClick = Math.floor(costClick * 1.5);
    updateUI();
  }
}

function buyAuto() {
  if (score >= costAuto) {
    score -= costAuto;
    auto++;
    costAuto = Math.floor(costAuto * 1.6);
    updateUI();
  }
}

setInterval(() => {
  score += auto;
  updateUI();
}, 1000);

function updateUI() {
  document.getElementById("score").textContent = Math.floor(score);
  document.getElementById("perClick").textContent = perClick;
  document.getElementById("auto").textContent = auto;
  document.getElementById("costClick").textContent = costClick;
  document.getElementById("costAuto").textContent = costAuto;
}

// LEADERBOARD
function saveScore() {
  let name = document.getElementById("name").value;
  if (!name) return alert("Anna nimi!");

  let scores = JSON.parse(localStorage.getItem("scores")) || [];

  scores.push({ name: name, score: Math.floor(score) });

  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 5); // top 5

  localStorage.setItem("scores", JSON.stringify(scores));
  showLeaderboard();
}

function showLeaderboard() {
  let scores = JSON.parse(localStorage.getItem("scores")) || [];
  let html = "";

  scores.forEach((s, i) => {
    html += `<p>${i+1}. ${s.name}: ${s.score}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

// lataa lista alussa
showLeaderboard();

// CHEAT CODE
let cheat = "";

document.addEventListener("keydown", (e) => {
  cheat += e.key.toLowerCase();

  // pidetään merkkijono lyhyenä
  if (cheat.length > 10) {
    cheat = cheat.slice(-10);
  }

  if (cheat.includes("money")) {
    score += 10000;
    alert("💰 CHEAT AKTIVOITU! +10 000 pistettä");
    cheat = "";
    updateUI();
  }

  if (cheat.includes("boost")) {
    perClick *= 10;
    alert("⚡ CHEAT! Tuplaklikkaus");
    cheat = "";
    updateUI();
  }
});

setInterval(() => {
  let save = loadGame();

  save.clicker = {
    score: score,
    perClick: perClick,
    auto: auto
  };

  saveGame(save);
}, 2000);

</script>

</body>
</html>
