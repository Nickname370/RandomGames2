<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terramine</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
canvas { display:block; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
}
#inventory button {
  margin:2px;
}
#back {
  position:absolute;
  top:10px;
  right:10px;
}
</style>
</head>
<body>

<a href="index.html"><button id="back">⬅️ Takaisin</button></a>

<div id="ui">
  <div>Valitse blokki:</div>
  <div id="inventory">
    <button onclick="setBlock(1)">🟫 Maa</button>
    <button onclick="setBlock(2)">🌱 Ruoho</button>
    <button onclick="setBlock(3)">🪨 Kivi</button>
    <button onclick="setBlock(4)">🌳 Puu</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const tileSize = 40;
const cols = Math.floor(canvas.width / tileSize);
const rows = Math.floor(canvas.height / tileSize);

let currentBlock = 1;

function setBlock(id) {
  currentBlock = id;
}

// LATAA maailma
let world = JSON.parse(localStorage.getItem("minecraftWorld"));

if (!world) {
  world = [];
  for (let y = 0; y < rows; y++) {
    world[y] = [];
    for (let x = 0; x < cols; x++) {
      if (y > rows/2) {
        world[y][x] = 1;
      } else {
        world[y][x] = 0;
      }
    }
  }
}

function saveWorld() {
  localStorage.setItem("minecraftWorld", JSON.stringify(world));
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      let block = world[y][x];

      if (block === 1) ctx.fillStyle = "#654321"; // maa
      if (block === 2) ctx.fillStyle = "#00cc44"; // ruoho
      if (block === 3) ctx.fillStyle = "#888888"; // kivi
      if (block === 4) ctx.fillStyle = "#91754d"; // puu

      if (block !== 0) {
        ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
      }
    }
  }
}

canvas.addEventListener("click", (e) => {
  let x = Math.floor(e.clientX / tileSize);
  let y = Math.floor(e.clientY / tileSize);
  world[y][x] = 0;
  saveWorld();
});

canvas.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  let x = Math.floor(e.clientX / tileSize);
  let y = Math.floor(e.clientY / tileSize);
  world[y][x] = currentBlock;
  saveWorld();
});

function loop() {
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
